name: Review PR
on:
  pull_request:
    types: [opened, synchronize]
jobs:
  # The test-suite job is the merge gate. Keep it dependency-light and
  # deterministic — it's the required status check on main, so anything
  # flaky here will block all PRs.
  test-suite:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm install

      - name: Test, type check, lint
        run: |
          npm test -- --passWithNoTests
          npx tsc --noEmit
          npm run lint

  # The claude-review job runs an AI review pass. Advisory only — it can
  # fail (turn cap, rate limit, action bugs) without blocking the merge.
  # Depends on test-suite so we don't waste API spend reviewing broken code.
  #
  # QA MODE is controlled by the .qa-mode file at the repo root:
  #   silent  → only post comments when issues are found (default)
  #   full    → always post a review summary, even when everything passes
  # Edit .qa-mode and commit to flip the mode at any point. The build
  # agent's acceptance-criteria self-check runs regardless.
  claude-review:
    needs: test-suite
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read QA mode
        id: qa
        run: echo "mode=$(cat .qa-mode 2>/dev/null | tr -d '[:space:]' || echo silent)" >> "$GITHUB_OUTPUT"

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          allowed_bots: 'claude'
          show_full_output: true
          prompt: |
            Review this PR. Read the linked Issue for the feature spec.
            Check: does the implementation match the acceptance criteria?
            Check: are there regressions in existing functionality?
            Check: does the code follow rules/app-spec.md and CLAUDE.md?
            The full test suite has already run and passed — focus on
            design, edge cases, and spec adherence.

            QA MODE: ${{ steps.qa.outputs.mode }}
            ${{ steps.qa.outputs.mode == 'full' && 'FULL MODE: post a brief review summary as a PR comment regardless of outcome. List what you checked and any concerns. This is the chatty mode — every PR gets a comment.' || 'SILENT MODE: only post review comments if you find issues that need attention. If everything matches the spec and rules, do NOT post anything — say so in your final response and exit. The test suite is the merge gate; the build agents already self-check acceptance criteria; this review is a safety net for spec drift only.' }}
          claude_args: '--max-turns 15 --model claude-sonnet-4-6 --allowedTools Bash(git*),Read,Glob,Grep'
