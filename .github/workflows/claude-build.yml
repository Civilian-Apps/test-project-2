name: Build Feature
on:
  issues:
    types: [labeled]
jobs:
  build:
    if: github.event.label.name == 'ready-to-build'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm install

      - name: Check dependencies
        run: |
          ISSUE_BODY=$(gh issue view ${{ github.event.issue.number }} --json body -q '.body')
          DEPS=$(echo "$ISSUE_BODY" | grep -oP '#\d+' | head -10)
          for dep in $DEPS; do
            STATE=$(gh issue view ${dep#\#} --json state -q '.state')
            if [ "$STATE" != "CLOSED" ]; then
              gh issue comment ${{ github.event.issue.number }} --body "Blocked: waiting on $dep"
              gh issue edit ${{ github.event.issue.number }} --remove-label ready-to-build --add-label blocked
              exit 1
            fi
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Record start time
        id: timer
        run: echo "start=$(date +%s)" >> "$GITHUB_OUTPUT"

      - uses: anthropics/claude-code-action@v1
        id: claude-build
        continue-on-error: true
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          show_full_output: true
          prompt: |
            You are implementing a GitHub issue end-to-end. This is NOT a conversation — you must do the work.

            HARD RULE: Never create, edit, or delete any file under .github/workflows/ or .github/actions/. The action's token lacks the `workflows` scope and the push will be rejected. If the issue asks for workflow changes, stop and post a comment on the issue explaining this.

            Steps (follow in order, use the Bash/Edit/Write tools):
            1. Read the issue body: gh issue view ${{ github.event.issue.number }} --json title,body
            2. Fetch the latest default branch so the base is current: git fetch origin main && git checkout -b claude/issue-${{ github.event.issue.number }} origin/main
            3. Follow TDD: write a failing test first, then minimum code to pass, then refactor.
            4. Run the FULL test suite, lint, and type check. Fix anything that breaks.
            5. Update CHANGELOG.md per rules/changelog-rule.md.
            6. Stage ONLY the files you intentionally changed (git add <paths>). Never `git add -A` the .github/ directory. Verify with `git status` that no .github/workflows/** files are staged.
            7. Commit with a conventional-commit message referencing the issue, e.g. "feat: add /terms page (#${{ github.event.issue.number }})".
            8. Rebase onto latest main in case it moved during your work:
               git fetch origin main
               git rebase origin/main
               If the rebase touches any .github/workflows/** file, abort: `git rebase --abort`, then `git reset --soft origin/main`, re-commit, and push. The branch must not modify workflow files.
            9. Push: git push -u origin claude/issue-${{ github.event.issue.number }}
            10. Open the PR: gh pr create --fill --head claude/issue-${{ github.event.issue.number }}
            11. Do not stop until the PR is open. Do not ask for confirmation.
          claude_args: '--max-turns 40 --model claude-opus-4-6 --allowedTools Bash,Read,Write,Edit,Glob,Grep'

      - name: Classify result
        if: always()
        run: |
          CONCLUSION="${{ steps.claude-build.outputs.conclusion }}"
          EXEC_FILE="${{ steps.claude-build.outputs.execution_file }}"
          ELAPSED=$(( $(date +%s) - ${{ steps.timer.outputs.start }} ))

          echo "Conclusion: $CONCLUSION"
          echo "Elapsed: ${ELAPSED}s"
          echo "Execution file: $EXEC_FILE"

          # Success — nothing to do
          if [ "$CONCLUSION" = "success" ]; then
            echo "Build succeeded."
            exit 0
          fi

          # Check if execution file exists and has meaningful content
          HAS_CONTENT=false
          if [ -n "$EXEC_FILE" ] && [ -f "$EXEC_FILE" ]; then
            LINES=$(wc -l < "$EXEC_FILE")
            if [ "$LINES" -gt 2 ]; then
              HAS_CONTENT=true
            fi
          fi

          # Classify failure:
          # - No content + fast (< 30s): rate limit or auth issue
          # - No content + slow: infrastructure issue
          # - Has content + failed: real build failure (code was wrong)
          if [ "$HAS_CONTENT" = "false" ] && [ "$ELAPSED" -lt 30 ]; then
            LABEL="rate-limited"
            MSG="Build stopped with no work done (${ELAPSED}s). Likely rate limited or auth issue."
          elif [ "$HAS_CONTENT" = "false" ]; then
            LABEL="rate-limited"
            MSG="Build stopped with no work done after ${ELAPSED}s. Infrastructure issue."
          else
            LABEL="build-failed"
            MSG="Build failed after ${ELAPSED}s with work in progress. Check [logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})."
          fi

          # Count previous retries for this issue
          RETRY_COUNT=$(gh issue view ${{ github.event.issue.number }} --json comments -q '[.comments[].body | select(startswith("Auto-retry"))] | length')

          if [ "$LABEL" = "rate-limited" ] && [ "$RETRY_COUNT" -ge 3 ]; then
            LABEL="rate-limit-paused"
            MSG="$MSG Paused after $RETRY_COUNT retries — will retry on next 30-min cycle."
          fi

          gh issue edit ${{ github.event.issue.number }} \
            --remove-label ready-to-build \
            --add-label "$LABEL"
          gh issue comment ${{ github.event.issue.number }} --body "$MSG"
          exit 1
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
