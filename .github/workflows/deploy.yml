name: Deploy to Vercel

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize]

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Setup Vercel auth
        run: |
          # Reconstruct the CLI auth file with the long-lived refresh token.
          # The CLI auto-refreshes the short-lived access token before each command.
          mkdir -p ~/.local/share/com.vercel.cli
          cat > ~/.local/share/com.vercel.cli/auth.json << EOF
          {"token":"needs-refresh","expiresAt":0,"refreshToken":"${{ secrets.VERCEL_REFRESH_TOKEN }}"}
          EOF
          chmod 600 ~/.local/share/com.vercel.cli/auth.json

      - name: Pull Vercel environment
        run: vercel pull --yes

      - name: Build
        run: vercel build ${{ github.ref == 'refs/heads/main' && '--prod' || '' }}

      - name: Deploy
        id: deploy
        run: |
          url=$(vercel deploy --prebuilt ${{ github.ref == 'refs/heads/main' && '--prod' || '' }})
          echo "url=$url" >> "$GITHUB_OUTPUT"

      - name: Comment preview URL on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `✅ Preview deployed: ${{ steps.deploy.outputs.url }}`
            })
