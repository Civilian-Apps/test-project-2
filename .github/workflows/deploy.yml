name: Deploy to Vercel

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize]

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    outputs:
      url: ${{ steps.deploy.outputs.url }}
      environment: ${{ steps.deploy.outputs.environment }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Pull Vercel environment
        run: vercel pull --yes --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build
        run: vercel build ${{ github.ref == 'refs/heads/main' && '--prod' || '' }} --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy
        id: deploy
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            DEPLOY_URL=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
            # Resolve the canonical production URL. Vercel projects can hold several
            # production aliases (e.g. `<name>-civilian-apps.vercel.app` and a randomised
            # `<name>-<suffix>.vercel.app` when the short name conflicts at the global
            # namespace). The right URL isn't always alias[0], so:
            #
            #   1. Try the team-pattern URL `<repo>-civilian-apps.vercel.app` and curl-verify
            #      it actually serves our app (2xx). If another Vercel account owns that
            #      short name, it'll return 401/403 and we skip it.
            #   2. Otherwise fall back to `alias[0]` from the Vercel API (the one Vercel
            #      considers primary for this project).
            #   3. Last resort: the per-deploy URL that `vercel deploy` just returned.
            REPO_NAME="${{ github.event.repository.name }}"
            EXPECTED_URL="https://${REPO_NAME}-civilian-apps.vercel.app"
            CODE=$(curl -s -o /dev/null -w "%{http_code}" -L --max-time 10 "$EXPECTED_URL" || echo 000)
            if [[ "$CODE" =~ ^2 ]]; then
              URL="$EXPECTED_URL"
            else
              ALIAS=$(curl -sf "https://api.vercel.com/v9/projects/${{ secrets.VERCEL_PROJECT_ID }}" \
                -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}" \
                | jq -r '.targets.production.alias[0] // empty')
              if [[ -n "$ALIAS" ]]; then
                URL="https://${ALIAS}"
              else
                URL="$DEPLOY_URL"
              fi
            fi
            echo "url=$URL" >> "$GITHUB_OUTPUT"
            echo "environment=production" >> "$GITHUB_OUTPUT"
          else
            URL=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
            echo "url=$URL" >> "$GITHUB_OUTPUT"
            echo "environment=preview-pr-${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Comment preview URL on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `✅ Preview deployed: ${{ steps.deploy.outputs.url }}`
            })

  record:
    needs: deploy
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # Always record on `main` so DEPLOYMENTS.md is the single registry of every active
      # deployment across production + open PR previews. Avoids cross-branch commit headaches.
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update DEPLOYMENTS.md
        run: |
          chmod +x .github/scripts/update-deployments.sh
          .github/scripts/update-deployments.sh \
            "${{ needs.deploy.outputs.environment }}" \
            "${{ needs.deploy.outputs.url }}" \
            "${{ github.sha }}" \
            "${{ github.actor }}"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add DEPLOYMENTS.md
          if git diff --staged --quiet; then
            echo "No changes to DEPLOYMENTS.md"
            exit 0
          fi
          git commit -m "chore: record ${{ needs.deploy.outputs.environment }} deployment [skip ci]"
          # Tiny race protection in case two deploys land simultaneously.
          for i in 1 2 3; do
            git pull --rebase origin main && git push origin main && exit 0
            sleep $((i * 2))
          done
          exit 1
