name: Vercel Auth Health Check

on:
  schedule:
    - cron: '0 9 * * 1' # Every Monday at 9am UTC
  workflow_dispatch: # Manual trigger

jobs:
  check-auth:
    runs-on: ubuntu-latest
    steps:
      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Setup Vercel auth
        run: |
          mkdir -p ~/.local/share/com.vercel.cli
          cat > ~/.local/share/com.vercel.cli/auth.json << EOF
          {"token":"needs-refresh","expiresAt":0,"refreshToken":"${{ secrets.VERCEL_REFRESH_TOKEN }}"}
          EOF
          chmod 600 ~/.local/share/com.vercel.cli/auth.json

      - name: Test auth refresh
        id: check
        run: |
          if vercel whoami 2>/dev/null; then
            echo "valid=true" >> "$GITHUB_OUTPUT"
          else
            echo "valid=false" >> "$GITHUB_OUTPUT"
            echo "::error::Vercel refresh token is invalid. Run 'vercel login' on the droplet and update VERCEL_REFRESH_TOKEN secret."
          fi

      - name: Create issue if auth broken
        if: steps.check.outputs.valid == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'infra',
              state: 'open',
              per_page: 100,
            });
            const alreadyOpen = existing.data.some(i => i.title.includes('Vercel auth broken'));
            if (!alreadyOpen) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: '🔑 Vercel auth broken — deployments are failing',
                body: [
                  'The `VERCEL_REFRESH_TOKEN` secret in this repo can no longer obtain a valid access token.',
                  '',
                  '**Fix:**',
                  '1. On the droplet: `vercel login`',
                  '2. Get the new refresh token: `cat ~/.local/share/com.vercel.cli/auth.json | python3 -c "import sys,json;print(json.load(sys.stdin)[\'refreshToken\'])"`',
                  '3. Update `VERCEL_REFRESH_TOKEN` secret in this repo and all other project repos',
                  '',
                  'All deployments are blocked until this is resolved.',
                ].join('\n'),
                labels: ['infra'],
              });
            }
